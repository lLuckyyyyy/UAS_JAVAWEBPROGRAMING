<!DOCTYPE html>
<html lang="en" xmlns:th="https://www.thymeleaf.org/">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Master Category - MiniLibrary</title>
    <!-- CDN Tailwind CSS untuk Tampilan Premium -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen text-slate-800">

    <div class="max-w-4xl mx-auto px-4 py-12">
        <!-- Header -->
        <div class="flex flex-col md:flex-row md:items-center md:justify-between border-b border-slate-200 pb-6 mb-8 gap-4">
            <div>
                <h1 th:text="${title}" class="text-3xl font-bold text-slate-900 tracking-tight">Master Category</h1>
                <p class="text-sm text-slate-500 mt-1">Sistem Informasi Perpustakaan &bull; MiniLibrary</p>
            </div>
            <div>
                <a th:href="@{/categories/add}" class="inline-flex items-center justify-center bg-indigo-600 hover:bg-indigo-700 text-white font-semibold px-5 py-2.5 rounded-lg shadow-sm hover:shadow transition-all duration-150 gap-2 text-sm">
                    + Tambah Kategori Baru
                </a>
            </div>
        </div>

        <!-- Tabel Data Kategori -->
        <div class="bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden">
            <table class="w-full text-left border-collapse">
                <thead>
                    <tr class="bg-slate-50 border-b border-slate-200">
                        <th class="py-4 px-6 text-xs font-semibold uppercase tracking-wider text-slate-500 w-1/4">ID Kategori</th>
                        <th class="py-4 px-6 text-xs font-semibold uppercase tracking-wider text-slate-500">Nama Kategori</th>
                        <th class="py-4 px-6 text-xs font-semibold uppercase tracking-wider text-slate-500 text-center w-1/3">Aksi</th>
                    </tr>
                </thead>
                <tbody class="divide-y divide-slate-100">
                    <!-- Tampilan jika tabel kosong -->
                    <tr th:if="${#lists.isEmpty(categories)}">
                        <td colspan="3" class="py-12 px-6 text-center text-slate-400">
                            Belum ada kategori tersimpan.
                        </td>
                    </tr>
                    <!-- Looping Thymeleaf -->
                    <tr th:each="category : ${categories}" class="hover:bg-slate-50/50 transition-colors">
                        <td th:text="${category.id}" class="py-4 px-6 font-mono text-sm text-slate-500">ID</td>
                        <td th:text="${category.name}" class="py-4 px-6 font-medium text-slate-900">Nama Kategori</td>
                        <td class="py-4 px-6 text-center">
                            <div class="inline-flex rounded-lg border border-slate-200 bg-white shadow-xs overflow-hidden text-xs">
                                <a th:href="@{/categories/edit/{id}(id=${category.id})}" class="px-4 py-2 text-indigo-600 hover:bg-slate-50 font-medium border-r border-slate-200">
                                    Edit
                                </a>
                                <a th:href="@{/categories/delete/{id}(id=${category.id})}" onclick="return confirm('Yakin ingin menghapus kategori ini?')" class="px-4 py-2 text-rose-600 hover:bg-rose-50 font-medium">
                                    Hapus
                                </a>
                            </div>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

</body>
</html>
